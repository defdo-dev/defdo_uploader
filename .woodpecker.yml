# ─── defdo_uploader Woodpecker CI/CD ───────────────────────────────────────
#
# Events:
#   push / pull_request → format check, compile, test
#   tag (semver)        → validate + publish to Hex.pm
#   manual              → CI run or publish
#   cron                → nightly CI
#
# Global secrets (configured in Woodpecker org settings):
#   hex_api_key       — Hex.pm API write key
#   hex_org_token     — Hex organization read token
#
# hex_org_name is "defdo" (not sensitive) — hardcoded to avoid secret injection issues.
#
# Optional environment:
#   HEX_PUBLISH_REPLACE — set to "true" to pass --replace to `mix hex.publish`
#
# Backend: Woodpecker LOCAL backend on the darwin/arm64 exec agent. `image:`
# names the SHELL (bash) that runs `commands`, NOT a container — the host has the
# Elixir/Mix toolchain in PATH. Without the platform label the tag job can land on
# a local agent that tries to exec the image string (e.g. elixir:1.19.5) as a
# binary and fails with `exec: "<image>": executable file not found`.

labels:
  platform: darwin/arm64

when:
  - event: [push, pull_request]
    branch: main
  - event: tag
  - event: manual
  - event: cron

steps:
  # ═══════════════════════════════════════════════════════════════════════
  #  CI
  # ═══════════════════════════════════════════════════════════════════════

  - name: format-and-compile
    image: bash
    when:
      event: [push, pull_request, cron]
    environment:
      HEX_ORG_TOKEN:
        from_secret: hex_org_token
    commands:
      - |
        set -e
        HEX_ORG_NAME="defdo"
        export HEX_ORG_NAME HEX_ORG_TOKEN

        mix do local.hex --force, local.rebar --force

        if [ -n "$HEX_ORG_TOKEN" ]; then
          mix hex.organization auth "$HEX_ORG_NAME" --key "$HEX_ORG_TOKEN"
        fi

        mix deps.get
        mix format --check-formatted
        mix compile --warnings-as-errors

  - name: test
    image: bash
    when:
      event: [push, pull_request, cron]
    environment:
      HEX_ORG_TOKEN:
        from_secret: hex_org_token
    commands:
      - |
        set -e
        HEX_ORG_NAME="defdo"
        export HEX_ORG_NAME HEX_ORG_TOKEN

        mix do local.hex --force, local.rebar --force

        if [ -n "$HEX_ORG_TOKEN" ]; then
          mix hex.organization auth "$HEX_ORG_NAME" --key "$HEX_ORG_TOKEN"
        fi

        mix deps.get
        mix compile --warnings-as-errors
        mix test

  # ═══════════════════════════════════════════════════════════════════════
  #  RELEASE — tag events
  # ═══════════════════════════════════════════════════════════════════════

  - name: release-validate
    image: bash
    when:
      event: tag
    environment:
      HEX_API_KEY:
        from_secret: hex_api_key
      HEX_ORG_TOKEN:
        from_secret: hex_org_token
    commands:
      - |
        set -e
        HEX_ORG_NAME="defdo"
        export HEX_API_KEY HEX_ORG_NAME HEX_ORG_TOKEN

        mix do local.hex --force, local.rebar --force

        if [ -n "$HEX_ORG_TOKEN" ]; then
          mix hex.organization auth "$HEX_ORG_NAME" --key "$HEX_ORG_TOKEN"
        fi

        mix deps.get
        mix format --check-formatted
        mix compile --warnings-as-errors
        mix test
        MIX_ENV=dev mix deps.get
        MIX_ENV=dev mix hex.build

  - name: hex-publish
    image: bash
    when:
      event: tag
    depends_on: [release-validate]
    environment:
      HEX_API_KEY:
        from_secret: hex_api_key
      HEX_ORG_TOKEN:
        from_secret: hex_org_token
    commands:
      - |
        set -e
        HEX_ORG_NAME="defdo"
        export HEX_API_KEY HEX_ORG_NAME HEX_ORG_TOKEN

        mix do local.hex --force, local.rebar --force

        if [ -n "$HEX_ORG_TOKEN" ]; then
          mix hex.organization auth "$HEX_ORG_NAME" --key "$HEX_ORG_TOKEN"
        fi

        mix deps.get
        mix test

        if [ -z "$HEX_API_KEY" ]; then
          echo "ERROR: HEX_API_KEY is required to publish"
          exit 1
        fi

        if [ "$HEX_PUBLISH_REPLACE" = "true" ]; then
          mix hex.publish --yes --replace
        else
          mix hex.publish --yes
        fi

  # ═══════════════════════════════════════════════════════════════════════
  #  MANUAL
  # ═══════════════════════════════════════════════════════════════════════

  - name: manual-ci
    image: bash
    when:
      event: manual
      evaluate: 'CI_PIPELINE_TRIGGER_MESSAGE != "publish"'
    environment:
      HEX_ORG_TOKEN:
        from_secret: hex_org_token
    commands:
      - |
        set -e
        HEX_ORG_NAME="defdo"
        export HEX_ORG_NAME HEX_ORG_TOKEN

        mix do local.hex --force, local.rebar --force

        if [ -n "$HEX_ORG_TOKEN" ]; then
          mix hex.organization auth "$HEX_ORG_NAME" --key "$HEX_ORG_TOKEN"
        fi

        mix deps.get
        mix format --check-formatted
        mix compile --warnings-as-errors
        mix test

  - name: manual-publish
    image: bash
    when:
      event: manual
      evaluate: 'CI_PIPELINE_TRIGGER_MESSAGE == "publish"'
    environment:
      HEX_API_KEY:
        from_secret: hex_api_key
      HEX_ORG_TOKEN:
        from_secret: hex_org_token
    commands:
      - |
        set -e
        HEX_ORG_NAME="defdo"
        export HEX_API_KEY HEX_ORG_NAME HEX_ORG_TOKEN

        mix do local.hex --force, local.rebar --force

        if [ -n "$HEX_ORG_TOKEN" ]; then
          mix hex.organization auth "$HEX_ORG_NAME" --key "$HEX_ORG_TOKEN"
        fi

        mix deps.get
        mix format --check-formatted
        mix compile --warnings-as-errors
        mix test
        MIX_ENV=dev mix hex.build

        if [ -z "$HEX_API_KEY" ]; then
          echo "ERROR: HEX_API_KEY is required to publish"
          exit 1
        fi

        if [ "$HEX_PUBLISH_REPLACE" = "true" ]; then
          mix hex.publish --yes --replace
        else
          mix hex.publish --yes
        fi

  # ═══════════════════════════════════════════════════════════════════════
  #  DEPLOY — woodpecker-cli deploy
  # ═══════════════════════════════════════════════════════════════════════

  - name: deploy-publish
    image: bash
    when:
      event: deployment
    environment:
      HEX_API_KEY:
        from_secret: hex_api_key
      HEX_ORG_TOKEN:
        from_secret: hex_org_token
    commands:
      - |
        set -e
        HEX_ORG_NAME="defdo"
        export HEX_API_KEY HEX_ORG_NAME HEX_ORG_TOKEN

        mix do local.hex --force, local.rebar --force

        if [ -n "$HEX_ORG_TOKEN" ]; then
          mix hex.organization auth "$HEX_ORG_NAME" --key "$HEX_ORG_TOKEN"
        fi

        mix deps.get
        mix format --check-formatted
        mix compile --warnings-as-errors
        mix test
        MIX_ENV=dev mix hex.build

        if [ -z "$HEX_API_KEY" ]; then
          echo "ERROR: HEX_API_KEY is required to publish"
          exit 1
        fi

        if [ "$HEX_PUBLISH_REPLACE" = "true" ]; then
          mix hex.publish --yes --replace
        else
          mix hex.publish --yes
        fi
